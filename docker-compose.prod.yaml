version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: portfolio_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - portfolio_network

  backend:
    image: ghcr.io/salvuccifacundo/fullstack-portfolio-backend:latest
    container_name: portfolio_backend_prod
    restart: always
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: db
      DB_PORT: 5432
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
    volumes:
      - portfolio_uploads:/app/uploads
    networks:
      - portfolio_network

  frontend:
    image: ghcr.io/salvuccifacundo/fullstack-portfolio-frontend:latest
    container_name: portfolio_frontend_prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - portfolio_network

networks:
  portfolio_network:
    driver: bridge

volumes:
  postgres_prod_data:
  portfolio_uploads:
